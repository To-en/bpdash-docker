services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bpdash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bpdash}
      POSTGRES_DB: ${POSTGRES_DB:-bpdash}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bpdash} -d ${POSTGRES_DB:-bpdash}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    image: blackpearlfsae/bpdash-backend   # NOTE: team Docker Hub org not registered yet — do not `docker compose push` until it is
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-bpdash}:${POSTGRES_PASSWORD:-bpdash}@db:5432/${POSTGRES_DB:-bpdash}
      PUBLISH_INTERVAL: ${PUBLISH_INTERVAL:-200}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      FRONTEND_DEPLOY_URL: ${FRONTEND_DEPLOY_URL:-}
    expose:
      - "3000"

  frontend:
    build: ./frontend
    image: blackpearlfsae/bpdash-frontend   # NOTE: team Docker Hub org not registered yet — do not `docker compose push` until it is
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      # - "443:443"                             # enable when TLS is wired up
    # volumes:
    #   - /etc/letsencrypt:/etc/letsencrypt:ro   # mount certbot certs when enabling HTTPS

volumes:
  db_data:
